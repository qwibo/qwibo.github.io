<link rel="stylesheet" href="{{ '/assets/css/hero-qwibo.css' | relative_url }}">

<div class="hero-qwibo" aria-hidden="true">
    <div class="hero-qwibo__stage">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" role="presentation">
            <defs>
                <linearGradient id="qwibo-tape-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0284c7" />
                    <stop offset="100%" stop-color="#38bdf8" />
                </linearGradient>
                <filter id="qwibo-blur" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Audio file (Marco) -->
            <g class="hero-qwibo__file">
                <rect x="14" y="68" width="72" height="56" rx="8" fill="#111827" stroke="#334155" stroke-width="1.5" />
                <rect x="22" y="78" width="18" height="14" rx="2" fill="rgba(56, 189, 248, 0.2)" stroke="#38bdf8" stroke-width="1" />
                <path d="M26 88 L30 84 L34 90 L38 82" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                {% if page.lang == 'it' %}
                <text x="22" y="106" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5" font-weight="600">riunione_marco.mp4</text>
                <text x="22" y="118" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="7.5">Marco · 2h call</text>
                {% else %}
                <text x="22" y="106" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5" font-weight="600">marco_call_2h.mp4</text>
                <text x="22" y="118" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="7.5">Marco · 2h call</text>
                {% endif %}
            </g>

            <!-- Reel glow -->
            <circle class="hero-qwibo__glow" cx="168" cy="100" r="24" fill="#0284c7" opacity="0.35" filter="url(#qwibo-blur)" />

            <!-- Qwibo reel -->
            <g class="hero-qwibo__reel">
                <circle cx="168" cy="100" r="16" stroke="#38bdf8" stroke-width="4" fill="#0f172a" />
                <circle cx="168" cy="100" r="4" fill="#38bdf8" />
            </g>

            <!-- Tape unrolling toward document -->
            <path class="hero-qwibo__tape" d="M184 100 C210 100 230 100 252 100" stroke="url(#qwibo-tape-gradient)" stroke-width="5" stroke-linecap="round" />
            <path class="hero-qwibo__tape-line" d="M252 100 H292" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" opacity="0.85" />

            <!-- Text lines emerging from tape (logo metaphor) -->
            <line class="hero-qwibo__tape-line" x1="252" y1="100" x2="318" y2="100" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
            <line class="hero-qwibo__tape-line hero-qwibo__tape-line--2" x1="252" y1="112" x2="302" y2="112" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.55" />
            <line class="hero-qwibo__tape-line hero-qwibo__tape-line--3" x1="252" y1="122" x2="278" y2="122" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.45" />

            <!-- Particles along tape -->
            <circle class="hero-qwibo__particle hero-qwibo__particle--1" cx="188" cy="100" r="3.5" fill="#bae6fd" />
            <circle class="hero-qwibo__particle hero-qwibo__particle--2" cx="188" cy="100" r="2.5" fill="#38bdf8" />
            <circle class="hero-qwibo__particle hero-qwibo__particle--3" cx="188" cy="100" r="2" fill="#0ea5e9" />

            <!-- Transcript document -->
            <g class="hero-qwibo__doc">
                <rect x="326" y="52" width="142" height="96" rx="6" fill="#111827" stroke="#334155" stroke-width="1.5" />
                <rect x="326" y="52" width="4" height="96" rx="2" fill="#0284c7" />
                <text x="340" y="74" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8" font-weight="700">TRANSCRIPT</text>
                {% if page.lang == 'it' %}
                <text class="hero-qwibo__line" x="340" y="92" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5">Decisioni Q2 approvate…</text>
                <text class="hero-qwibo__line hero-qwibo__line--2" x="340" y="106" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5">Follow-up entro venerdì</text>
                {% else %}
                <text class="hero-qwibo__line" x="340" y="92" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5">Q2 decisions approved…</text>
                <text class="hero-qwibo__line hero-qwibo__line--2" x="340" y="106" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8.5">Follow-up by Friday</text>
                {% endif %}
            </g>

            <!-- SRT export badge -->
            <g class="hero-qwibo__srt">
                <rect x="340" y="114" width="52" height="14" rx="2" fill="rgba(56, 189, 248, 0.15)" stroke="#38bdf8" stroke-width="0.5" />
                {% if page.lang == 'it' %}
                <text x="344" y="124" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="7" font-weight="600">SRT ✓</text>
                {% else %}
                <text x="344" y="124" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="7" font-weight="600">SRT ✓</text>
                {% endif %}
            </g>

            <!-- Optional LLM summary -->
            <g class="hero-qwibo__summary">
                <rect x="396" y="114" width="62" height="14" rx="2" fill="rgba(14, 165, 233, 0.12)" stroke="#0ea5e9" stroke-width="0.5" stroke-dasharray="3 2" />
                {% if page.lang == 'it' %}
                <text x="400" y="124" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="6.5">Riassunto (opz.)</text>
                {% else %}
                <text x="400" y="124" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="6.5">Summary (opt.)</text>
                {% endif %}
            </g>
        </svg>
    </div>
</div>
