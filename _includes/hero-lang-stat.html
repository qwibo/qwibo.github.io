{% assign first_lang = site.hero_languages | first %}
<div class="lang-cycle"
    data-lang-cycle
    aria-live="polite"
    data-static-label="{% if page.lang == 'it' %}5 lingue{% else %}5 languages{% endif %}"
    {% if page.lang == 'it' %}
    data-langs='[{"code":"IT","label":"Italiano"},{"code":"EN","label":"Inglese"},{"code":"ES","label":"Spagnolo"},{"code":"DE","label":"Tedesco"},{"code":"FR","label":"Francese"}]'
    {% else %}
    data-langs='[{"code":"IT","label":"Italian"},{"code":"EN","label":"English"},{"code":"ES","label":"Spanish"},{"code":"DE","label":"German"},{"code":"FR","label":"French"}]'
    {% endif %}>
    <div class="text-brand-pink font-bold text-lg mb-1 font-mono lang-cycle__code-wrap">
        <span class="lang-cycle__code">{{ first_lang.code }}</span>
    </div>
    <div class="lang-cycle__label-wrap normal-case">
        <span class="lang-cycle__label">{% if page.lang == 'it' %}{{ first_lang.label_it }}{% else %}{{ first_lang.label_en }}{% endif %}</span>
    </div>
</div>
